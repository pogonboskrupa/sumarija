name: forestry_tracker
description: Aplikacija za praćenje kretanja inženjera šumarstva pri doznaci

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Supabase
  supabase_flutter: ^2.5.0

  # Karte
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.5

  # GPS - background tracking
  geolocator: ^12.0.0
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.2.2

  # Dozvole
  permission_handler: ^11.3.1

  # Import fajlova (KML, GeoJSON)
  file_picker: ^8.1.2
  xml: ^6.5.0

  # Utility
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  path_provider: ^2.1.4
  collection: ^1.18.0

  # UI
  flutter_colorpicker: ^1.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.5
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
