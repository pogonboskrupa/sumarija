name: Stamp app version

# Semantičko verzionisanje (major.minor.patch). Izvor istine je fajl VERSION
# u root-u repozitorija. Pri svakom pushu na main:
#   1. Pročita trenutnu verziju iz VERSION (npr. "1.4.0")
#   2. Upiše TU verziju u js/app.js (APP_VERSION) — to je verzija koja se
#      upravo deploy-uje, prikazana u meniju pored "Odjavi se"
#   3. Poveća patch broj (1.4.0 → 1.4.1) i sačuva nazad u VERSION za sljedeći push
# Tako je uvijek jasno koja je verzija live, a svaki naredni commit na main
# automatski dobija sljedeći broj bez ručne intervencije.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp-version:
    runs-on: ubuntu-latest
    # Spriječi beskonačnu petlju — bot-ov commit nosi [skip ci] pa se ne re-triggeruje
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp current version into js/app.js
        id: stamp
        run: |
          set -e
          SHA=$(git rev-parse --short HEAD)
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          sed -i "s|const APP_VERSION = '.*';|const APP_VERSION = '${CURRENT}';|" js/app.js
          sed -i "s|const BUILD_COMMIT = '.*';|const BUILD_COMMIT = '${SHA}';|" js/app.js
          echo "Stamped live version: ${CURRENT} (${SHA})"

          # Izračunaj sljedeću patch verziju za NAREDNI push
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "$NEXT" > VERSION
          echo "Next version will be: ${NEXT}"

      - name: Commit version stamp
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- js/app.js VERSION; then
            git add js/app.js VERSION
            git commit -m "chore: stamp app version [skip ci]"
            git push
          else
            echo "No version change to commit."
          fi
